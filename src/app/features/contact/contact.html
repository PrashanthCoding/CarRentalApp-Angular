<div class="contact-container">
  <h1>Contact Us</h1>
  <p>Get in touch with us for any inquiries or support.</p>
  <form class="contact-form" (ngSubmit)="sendMessage()">
    <input type="text" placeholder="Name" [(ngModel)]="contact.name" name="name" required />

    <input type="email" placeholder="Email" [(ngModel)]="contact.email" name="email" required />

    <textarea
      placeholder="Message"
      rows="5"
      [(ngModel)]="contact.message"
      name="message"
      required
    ></textarea>

    <button type="submit">Send Message</button>
  </form>
  <div class="contact-info">
    <p><strong>Email:</strong> info@sasscars.com</p>
    <p><strong>Phone:</strong> +1 (555) 123-4567</p>
    <p><strong>Address:</strong> 123 Car Street, City, State 12345</p>
  </div>
</div>
